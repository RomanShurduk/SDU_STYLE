<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Глибина. Перемога. Омега.</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #17191b;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 1536px;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .order-button {
      position: absolute;
      left: 8.7%;
      top: 79.2%;
      width: 24.7%;
      height: 11.8%;

      border: 2px solid transparent;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;

      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.2s ease;
    }

    .order-button:hover,
    .order-button:focus-visible {
      border-color: #ffd85a;
      box-shadow:
        0 0 10px #ffd85a,
        0 0 24px rgba(255, 216, 90, 0.75),
        0 0 42px rgba(255, 190, 0, 0.38);
      outline: none;
      transform: scale(1.02);
    }

    .order-button:active {
      transform: scale(0.99);
    }
  </style>
</head>

<body>
  <main class="page">
    <img
      class="hero-image"
      src="hero.png"
      alt="Глибина. Перемога. Омега. Футболки та бойові водолази">

    <a
      class="order-button"
      href="#order"
      aria-label="Замовити">
    </a>
  </main>
</body>
</html>
