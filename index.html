<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глибина. Перемога. Омега.</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #151719;
    }

    body {
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    .landing {
      position: relative;
      width: min(100vw, 1536px);
      aspect-ratio: 3 / 2;
      background: url("omega-hero.png") center / contain no-repeat;
      overflow: hidden;
    }

    /* Прозора інтерактивна зона точно поверх жовтого балона */
    .tank-hotspot {
      position: absolute;
      left: 8.8%;
      top: 79.0%;
      width: 24.6%;
      height: 12.0%;
      border: 0;
      padding: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Контурне підсвічення */
    .tank-hotspot::before {
      content: "";
      position: absolute;
      inset: 2% 1%;
      border-radius: 999px;
      border: 2px solid transparent;
      opacity: 0;
      transform: scale(0.985);
      transition:
        opacity 180ms ease,
        transform 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
      pointer-events: none;
    }

    .tank-hotspot:hover::before,
    .tank-hotspot:focus-visible::before {
      opacity: 1;
      transform: scale(1.025);
      border-color: #ffd75a;
      box-shadow:
        0 0 8px rgba(255, 215, 90, 0.95),
        0 0 20px rgba(255, 204, 45, 0.72),
        0 0 38px rgba(255, 188, 0, 0.36),
        inset 0 0 12px rgba(255, 225, 120, 0.24);
    }

    .tank-hotspot:active::before {
      opacity: 1;
      transform: scale(0.99);
      border-color: #fff2a8;
      box-shadow:
        0 0 10px rgba(255, 242, 168, 1),
        0 0 24px rgba(255, 215, 90, 0.85),
        inset 0 0 15px rgba(255, 235, 150, 0.28);
    }

    /* М'який ореол навколо балона */
    .tank-hotspot::after {
      content: "";
      position: absolute;
      inset: -10% -4%;
      border-radius: 999px;
      background: radial-gradient(
        ellipse at center,
        rgba(255, 213, 74, 0.22) 0%,
        rgba(255, 213, 74, 0.10) 42%,
        transparent 72%
      );
      filter: blur(10px);
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .tank-hotspot:hover::after,
    .tank-hotspot:focus-visible::after,
    .tank-hotspot:active::after {
      opacity: 1;
    }

    @media (max-width: 700px) {
      .landing {
        width: 100vw;
      }
      .tank-hotspot::before {
        border-width: 1.5px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tank-hotspot::before,
      .tank-hotspot::after {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="landing" aria-label="Лендінг Омега">
    <button
      class="tank-hotspot"
      type="button"
      aria-label="Замовити"
      onclick="alert('Тут можна підключити форму замовлення або перехід на потрібну сторінку.')">
    </button>
  </main>
</body>
</html>
